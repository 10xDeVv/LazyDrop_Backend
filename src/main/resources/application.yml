spring:
  application:
    name: lazydrop
  main:
    lazy-initialization: true

  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  web:
    resources:
      add-mappings: false
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  output:
    ansi:
      enabled: always
  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB
supabase:
  url: ${SUPABASE_URL}
  anon-key: ${SUPABASE_ANON_KEY}
  jwt-secret: ${SUPABASE_JWT_SECRET}

spaces:
  endpoint: ${SPACES_ENDPOINT}
  region: ${SPACES_REGION}
  bucket-name: ${SPACES_BUCKET}
  access-key: ${SPACES_ACCESS_KEY}
  secret-key: ${SPACES_SECRET_KEY}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  frontend-url: ${APP_FRONTEND_URL}
  join:
    base:
      url: https://lazydrop.app/join?code=%s
  cookies:
    secure: ${APP_COOKIES_SECURE:false}


stripe:
  secret-key: ${STRIPE_TEST_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  prices:
    pro: ${STRIPE_PRICE_PRO}
    plus: ${STRIPE_PRICE_PLUS}
  success-url: ${app.frontend-url}/checkout/success
  cancel-url: ${app.frontend-url}/checkout/cancel
  billing-portal: ${app.frontend-url}/account?fromPortal=1